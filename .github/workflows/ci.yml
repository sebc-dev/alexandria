name: CI Alexandria - Build, Test & Security

on:
  # Triggers principaux pour status checks automatiques
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Trigger manuel (workaround pour re-runs)
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'SHA du commit pour le status check'
        required: false
        type: string

permissions:
  contents: read

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  MAVEN_OPTS: '-Xmx4096m'

jobs:
  # Job 1: Initialisation du status check
  init-check:
    name: Initialize Status Check
    runs-on: ubuntu-latest
    permissions:
      checks: write
    outputs:
      check_run_id: ${{ steps.create-check.outputs.check_id }}
      effective_sha: ${{ steps.determine-sha.outputs.sha }}
    steps:
      - name: Determine effective SHA
        id: determine-sha
        env:
          INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "$INPUT_COMMIT_SHA" ]; then
            echo "sha=$INPUT_COMMIT_SHA" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Create check run
        id: create-check
        uses: LouisBrunner/checks-action@6b626ffbad7cc56fd58627f774b9067e6118af23  # v2.0.0
        with:
          sha: ${{ steps.determine-sha.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Alexandria CI Pipeline
          status: in_progress
          output: |
            {"summary":"Pipeline en cours d'exécution..."}

  # Job 2: Build + Tests unitaires
  build-and-unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    needs: init-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 25 LTS
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          # check-latest: false (défaut) pour builds plus rapides
          # Java 25 n'est pas pré-caché sur runners GitHub

      - name: Compile project
        run: mvn -B compile -DskipTests

      - name: Run unit tests
        run: mvn -B test -Dtest='!**/*IT' -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-results
          path: |
            **/target/surefire-reports/
            **/target/jacoco.exec
          retention-days: 7

  # Job 3: Tests d'intégration Testcontainers
  # Testcontainers 2.0.2+ requis (1.x incompatible Docker Engine 29.0.0+)
  integration-tests:
    name: Integration Tests (Testcontainers + pgvector)
    runs-on: ubuntu-latest
    needs: init-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 25 LTS
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Pre-pull pgvector image
        run: docker pull pgvector/pgvector:0.8.1-pg18

      - name: Run integration tests
        run: |
          mvn -B verify \
            -Dsurefire.skip=true \
            -Dfailsafe.failIfNoSpecifiedTests=false \
            -Dfailsafe.timeout=600

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-results
          path: |
            **/target/failsafe-reports/
          retention-days: 7

  # Job 4: Analyse qualité SonarCloud
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: init-check
    permissions:
      pull-requests: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check SONAR_TOKEN availability
        id: check-token
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "⚠️ SONAR_TOKEN not configured - skipping SonarCloud analysis"
            echo "available=false" >> $GITHUB_OUTPUT
          else
            echo "✅ SONAR_TOKEN configured"
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check-token.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 25 LTS
        if: steps.check-token.outputs.available == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and analyze
        if: steps.check-token.outputs.available == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:5.3.0.6276:sonar \
            -Dsonar.projectKey=sebc-dev_alexandria \
            -Dsonar.organization=${{ github.repository_owner }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.java.source=25 \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.scanner.jreProvisioning=disabled

      - name: SonarCloud Report Summary
        if: always() && steps.check-token.outputs.available == 'true'
        run: |
          echo "## SonarCloud Analysis" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Report](https://sonarcloud.io/summary/new_code?id=sebc-dev_alexandria)" >> $GITHUB_STEP_SUMMARY

  # Job 5: Sécurité SAST - CodeQL
  codeql:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest
    needs: init-check
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-and-quality

      - name: Set up Java 25 LTS
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build for CodeQL
        run: mvn -B compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java"

  # Job 6: Sécurité dépendances - OWASP + Trivy
  dependency-security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: init-check
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 25 LTS
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: OWASP Dependency-Check
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=8 \
            -Dformat=ALL \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-dependency-scan'

      - name: Upload OWASP report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.*
          retention-days: 14

  # Job 7: Build Docker (validation sans push)
  # TODO: Enable when Dockerfile is created
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    if: false  # Disabled until Dockerfile exists
    needs: [build-and-unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Java 25 LTS
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build JAR for Docker
        run: mvn -B package -DskipTests

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: alexandria-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'alexandria-mcp:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-docker.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Docker scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-docker.sarif'
          category: 'trivy-docker-scan'

  # Job 8: Finalisation du status check
  finalize:
    name: Finalize Status Check
    runs-on: ubuntu-latest
    permissions:
      checks: write
    needs:
      - init-check
      - build-and-unit-tests
      - integration-tests
      - sonarcloud
      - codeql
      - dependency-security
      - docker-build
    if: always()
    steps:
      - name: Determine overall status
        id: status
        run: |
          # Docker build is optional (skipped until Dockerfile exists)
          # SonarCloud is optional (skipped if SONAR_TOKEN not configured)
          DOCKER_OK=${{ needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped' }}
          SONAR_OK=${{ needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped' }}
          if [[ "${{ needs.build-and-unit-tests.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" == "success" && \
                "$SONAR_OK" == "true" && \
                "${{ needs.codeql.result }}" == "success" && \
                "${{ needs.dependency-security.result }}" == "success" && \
                "$DOCKER_OK" == "true" ]]; then
            echo "conclusion=success" >> $GITHUB_OUTPUT
          else
            echo "conclusion=failure" >> $GITHUB_OUTPUT
          fi

      - name: Update check run
        uses: LouisBrunner/checks-action@6b626ffbad7cc56fd58627f774b9067e6118af23  # v2.0.0
        with:
          check_id: ${{ needs.init-check.outputs.check_run_id }}
          sha: ${{ needs.init-check.outputs.effective_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Alexandria CI Pipeline
          conclusion: ${{ steps.status.outputs.conclusion }}
          output: |
            {"summary":"Pipeline terminé avec statut: ${{ steps.status.outputs.conclusion }}","title":"Résultat CI Alexandria"}
