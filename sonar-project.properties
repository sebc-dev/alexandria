# SonarCloud Configuration for Alexandria MCP
# Note: Most settings are passed via Maven in CI, this file provides defaults

sonar.projectKey=sebc-dev_alexandria
# sonar.organization is set via -Dsonar.organization in CI workflow
# (properties files don't expand shell variables)
sonar.host.url=https://sonarcloud.io

# Java version
sonar.java.source=25

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions
sonar.exclusions=**/generated/**,**/src/test/**

# Note: Java 25 support pending (SonarCloud uses ECJ which lags behind)
# Workaround: -Dsonar.scanner.jreProvisioning=disabled in CI
