# PostgreSQL configuration for RAG application
# Custom settings for pgvector + Apache AGE

# Listen on all interfaces (required for Docker)
listen_addresses = '*'

# Required for Apache AGE - load extension on startup
shared_preload_libraries = 'age'

# Memory settings for HNSW index operations
# Should be <= shm_size in docker-compose.yml
maintenance_work_mem = 512MB

# Work memory for complex queries (vector operations)
work_mem = 64MB

# Effective cache size for query planner (estimate of OS cache)
effective_cache_size = 1GB
