# PostgreSQL configuration for Alexandria RAG
# Optimized for: 24GB RAM, 4 CPU cores
# Extensions: pgvector 0.8.1, Apache AGE 1.6.0

# ===========================================
# Connection Settings
# ===========================================
listen_addresses = '*'
max_connections = 100

# ===========================================
# Memory Settings (24GB RAM)
# ===========================================
# 25% of RAM for PostgreSQL buffer cache
shared_buffers = 6GB

# Per-operation memory for sorts, hashes, vector ops
work_mem = 64MB

# Memory for index creation (HNSW builds)
# Must be <= shm_size in docker-compose.yml
maintenance_work_mem = 2GB

# Tell planner about available OS cache (~75% of RAM)
effective_cache_size = 18GB

# ===========================================
# Parallelism (4 cores)
# ===========================================
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ===========================================
# Extensions
# ===========================================
# Required for Apache AGE
shared_preload_libraries = 'age'

# ===========================================
# Write-Ahead Log (WAL)
# ===========================================
max_wal_size = 2GB
min_wal_size = 512MB

# ===========================================
# Query Planner (SSD storage assumed)
# ===========================================
random_page_cost = 1.1
effective_io_concurrency = 200

# ===========================================
# Logging (debugging)
# ===========================================
log_min_duration_statement = 1000
log_statement = 'ddl'
