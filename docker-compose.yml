# Configuration: Copy .env.example to .env to customize settings
# See .env.example for all available options

services:
  postgres:
    build: .
    container_name: rag-postgres
    networks:
      - internal
    environment:
      POSTGRES_USER: ${DB_USER:-alexandria}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alexandria}
      POSTGRES_DB: ${DB_NAME:-alexandria}
    volumes:
      # Data persistence
      - ./data:/var/lib/postgresql/data
      # Liquibase changelogs for init scripts
      - ./src/main/resources/db/changelog:/docker-entrypoint-initdb.d/changelog:ro
      # Init script to run Liquibase changelogs
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
    # Shared memory for HNSW index operations
    # Must be >= maintenance_work_mem in postgresql.conf (2GB + margin)
    shm_size: 3g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alexandria} -d ${DB_NAME:-alexandria}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: alexandria-app
    networks:
      - internal
      - caddy-net
    environment:
      # Spring profiles for HTTP/SSE transport
      SPRING_PROFILES_ACTIVE: http,docker
      # Database connection (uses service name as hostname)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-alexandria}
      DB_USER: ${DB_USER:-alexandria}
      DB_PASSWORD: ${DB_PASSWORD:-alexandria}
      # Logging level (optional override)
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # Documentation directory (read-only mount)
      - ${DOCS_PATH:-./docs}:/docs:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Use wget instead of curl (smaller image, no curl installed)
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Extended start_period for ONNX model loading (can take 60-120s)
      start_period: 120s
    restart: unless-stopped
    # Memory limit (ONNX model needs ~500MB, app needs ~500MB, buffer for GC)
    mem_limit: ${MEM_LIMIT:-2g}

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.114.0
    container_name: alexandria-vm
    profiles: ["eval"]
    networks:
      - internal
    volumes:
      - vm-data:/victoria-metrics-data
      - ./monitoring/victoriametrics/scrape.yaml:/etc/vm/scrape.yaml:ro
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=30d"
      - "-promscrape.config=/etc/vm/scrape.yaml"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.0
    container_name: alexandria-loki
    profiles: ["eval"]
    networks:
      - internal
    volumes:
      - loki-data:/loki
      - ./monitoring/loki/loki-config.yaml:/etc/loki/config.yaml:ro
    command: -config.file=/etc/loki/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: alexandria-grafana
    profiles: ["eval"]
    networks:
      - internal
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  internal:
    # Internal network for postgres <-> app communication
  caddy-net:
    external: true

volumes:
  vm-data:
  loki-data:
  grafana-data:
