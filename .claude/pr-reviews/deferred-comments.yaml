    title: "CVE-2025-11226 logback-core - analyse et mise à jour"
    summary: |
      Mise à jour de dépendances transitives hors scope PR - CVE-2025-11226 nécessite Janino et écriture fichier config.
    original_comment: |
      `checker-qual` est en version 3.43.0 alors que la version 3.52.0 (novembre 2025) est disponible.
      Plus critique, `swagger-annotations-jakarta` en version 2.2.38 inclut une dépendance transitive
      vulnérable (CVE-2025-11226 dans `logback-core` — exécution de code arbitraire). Mettre à jour
      vers les versions actuelles : `checker-qual:3.52.0` et `swagger-annotations-jakarta:2.2.41`.
    analysis_notes: |
      CVE-2025-11226 affecte logback-core versions <1.3.16 et >=1.4.0 <1.5.19.
      Exploitation requiert DEUX conditions:
      1. Janino library sur le classpath
      2. Accès écriture au fichier logback.xml OU injection variable d'environnement
      CVSS score 5.9 (modéré), pas critique.

      swagger-annotations-jakarta n'a PAS de dépendance transitive directe sur logback-core.
      Le commentaire CodeRabbit semble confondre avec d'autres composants.
    action_required: |
      Dans PR dependency-updates:
      1. Vérifier version logback-core dans Spring Boot 3.5.9 BOM
      2. Si vulnérable, override explicite vers logback-core >= 1.5.19
      3. Mettre à jour checker-qual vers 3.52.1+
      4. Mettre à jour swagger-annotations-jakarta vers 2.2.41+
    target_phase: "maintenance"
    resolution:
      status: "not_applicable"
      resolved_at: "2026-01-08"
      notes: |
        CVE-2025-11226 n'affecte PAS ce projet:
        - Version vulnérable: logback-core < 1.3.16 ou >=1.4.0 < 1.5.19
        - Version projet: logback-core 1.5.22 (via Spring Boot 3.5.9 BOM)
        - De plus, swagger-annotations-jakarta n'a pas de dépendance transitive sur logback-core
        Les mises à jour checker-qual/swagger sont couvertes par issue #9

