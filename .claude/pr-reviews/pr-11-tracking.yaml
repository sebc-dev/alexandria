        - github/codeql-action/init@27fcff4ecb39e96348e7ceddcc2d9ef42308b6fc  # v4
        - etc.

        Seule exception: aquasecurity/trivy-action@0.33.1 (lignes 240 et 299) utilise un tag mutable.
        Cette incohérence crée une faille de sécurité car les tags peuvent être déplacés.

        Le pinning par SHA protège contre:
        - Modification malveillante des tags upstream
        - Supply chain attacks
        - Comportement non déterministe des workflows

        SHA v0.33.1 confirmé: b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
