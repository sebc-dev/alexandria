  - id: "2673846370"
    source: "inline"
    file: ".github/workflows/ci.yml"
    line: 48
    type: "security"
    original_comment: |
      [Potential issue | Major] Risque d'injection de commande shell.
      Les inputs workflow_dispatch sont interpolés directement dans le script shell via ${{ inputs.commit_sha }}.
      Un acteur malveillant avec accès au déclenchement manuel pourrait injecter des commandes.
      Correction recommandée: utiliser une variable d'environnement.
    analysis:
      decision: "ACCEPT"
      confidence: 0.75
      type: "best-practice"
      criticality: "MINOR"
      effort: "TRIVIAL"
      regression_risk: false
      summary: "Best practice GitHub Actions: passer les inputs par des variables d'environnement"
      rationale: |
        Le risque d'injection réel est faible (workflow_dispatch nécessite write access), mais suivre la best practice
        GitHub Actions recommandée améliore la posture de sécurité et évite de créer des mauvais exemples pour la communauté.
        La correction est triviale et sans risque de régression.
      code_suggestion: |
        - name: Determine effective SHA
          id: determine-sha
          env:
            INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
          run: |
            if [ -n "$INPUT_COMMIT_SHA" ]; then
              echo "sha=$INPUT_COMMIT_SHA" >> $GITHUB_OUTPUT
            else
              echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            fi
      research_needed: null
    status: "analyzed"
    resolution_status: null

