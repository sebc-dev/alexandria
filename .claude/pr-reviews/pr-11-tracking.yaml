  - id: "2673863345"
    source: "inline"
    file: ".github/workflows/ci.yml"
    line: 87
    type: "bug"
    original_comment: |
      [Potential issue | Major] Corriger le pattern d'exclusion des tests d'intégration.
      Le pattern -Dtest='!**/*IT.java' ne fonctionnera probablement pas correctement.
      Maven Surefire utilise des noms de classes Java, pas des chemins de fichiers.
      L'extension .java doit être omise.
      Correction proposée: -Dtest='!**/*IT'
    analysis:
      decision: "ACCEPT"
      confidence: 0.90
      type: "best-practice"
      criticality: "MINOR"
      effort: "TRIVIAL"
      regression_risk: false
      summary: "Omettre l'extension .java dans le pattern -Dtest par conformité best practices Maven"
      rationale: |
        Selon la documentation officielle Maven Surefire, l'extension .java est optionnelle et sera automatiquement supprimée si fournie.
        Citation: "the extension is optional and will be stripped off if you accidentally provide one".
        Bien que le pattern actuel -Dtest='!**/*IT.java' fonctionne techniquement, suivre la convention Maven recommandée améliore la lisibilité et évite toute confusion.
        Les exemples officiels utilisent systématiquement la forme sans extension (ex: -Dtest='!Unstable*').
      code_suggestion: |
        # Ligne 87 - Remplacer:
        run: mvn -B test -Dtest='!**/*IT.java' -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false
        # Par:
        run: mvn -B test -Dtest='!**/*IT' -DfailIfNoTests=false -Dsurefire.failIfNoSpecifiedTests=false
      research_needed: null
    status: "analyzed"
    resolution_status: null

