    type: "best-practice"
    original_comment: |
      [Major] Gérer l'absence potentielle de NVD_API_KEY.
      Le NVD_API_KEY est utilisé sans vérifier sa disponibilité.
      Sans cette clé, OWASP Dependency-Check fonctionnera mais avec des limites de débit strictes.
      Suggestion: Ajouter une vérification conditionnelle similaire à celle de SonarCloud.
    analysis:
      decision: "ACCEPT"
      confidence: 0.90
      type: "best-practice"
      criticality: "IMPORTANT"
      effort: "LOW"
      regression_risk: false
      summary: "Ajouter validation NVD_API_KEY pour éviter rate-limiting silencieux"
      rationale: |
        Le commentaire est pertinent et cohérent avec le pattern établi pour SONAR_TOKEN.
        Contexte: OWASP Dependency-Check utilise l'API NVD (National Vulnerability Database).
        Sans la clé API, l'outil fonctionne mais avec un rate limit de 0.6 req/s vs 3.6 req/s avec clé.
        Impact sur CI: scans très lents (plusieurs minutes) avec risque d'échec par timeout.

        Le job sonarcloud (lignes 138-147) implémente déjà un pattern similaire:
        - Vérification via step dédié avec SONAR_TOKEN en env
        - Skip gracieux des étapes suivantes si non configuré
        - Job finalize (ligne 334) accepte result='skipped' comme succès

        Appliquer le même pattern pour NVD_API_KEY améliore l'expérience développeur:
        - Feedback clair si clé manquante
        - Évite des builds lents et échecs cryptiques
        - Permet une configuration post-merge comme SONAR_TOKEN
      code_suggestion: |
        dependency-security:
          name: Dependency Security Scan
          runs-on: ubuntu-latest
          needs: init-check
          permissions:
            security-events: write
          env:
            NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          steps:
            - name: Check NVD_API_KEY availability
              id: check-key
              run: |
                if [ -z "$NVD_API_KEY" ]; then
                  echo "⚠️ NVD_API_KEY not configured - OWASP scan will run with strict rate limits"
                  echo "available=false" >> $GITHUB_OUTPUT
                else
                  echo "✅ NVD_API_KEY configured"
                  echo "available=true" >> $GITHUB_OUTPUT
                fi

            - name: Checkout code
              uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6

            - name: Set up Java 25 LTS
              uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e  # v5
              with:
                distribution: ${{ env.JAVA_DISTRIBUTION }}
                java-version: ${{ env.JAVA_VERSION }}
                cache: maven

            - name: OWASP Dependency-Check
              run: |
                mvn -B org.owasp:dependency-check-maven:check \
                  -DfailBuildOnCVSS=8 \
                  -Dformat=ALL \
                  ${{ steps.check-key.outputs.available == 'true' && format('-DnvdApiKey={0}', env.NVD_API_KEY) || '' }}
      research_needed: null
