  - id: "actionlint-134"
    source: "actionlint"
    file: ".github/workflows/ci.yml"
    line: 134
    type: "bug"
    original_comment: |
      [actionlint 1.7.10] context "secrets" is not allowed here.
      Available contexts are "github", "inputs", "needs", "vars".
      The condition if: ${{ secrets.SONAR_TOKEN != '' }} at job level is invalid.
    analysis:
      decision: "ACCEPT"
      confidence: 1.0
      type: "bug"
      criticality: "BLOCKING"
      effort: "LOW"
      regression_risk: false
      summary: "secrets context invalide au niveau job.if - déplacer vérification au niveau step"
      rationale: |
        Bug avéré détecté par actionlint. Le contexte 'secrets' n'est pas disponible dans job.if.
        Seuls github, inputs, needs, vars sont autorisés à ce niveau.
        Solution: déplacer SONAR_TOKEN en env du job et vérifier via un step dédié.
      code_suggestion: |
        sonarcloud:
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          steps:
            - name: Check SONAR_TOKEN availability
              id: check-token
              run: |
                if [ -z "$SONAR_TOKEN" ]; then
                  echo "available=false" >> $GITHUB_OUTPUT
                else
                  echo "available=true" >> $GITHUB_OUTPUT
                fi
            - name: Subsequent steps...
              if: steps.check-token.outputs.available == 'true'
      research_needed: null
    status: "applied"
    resolution_status: "applied_now"
