      rationale: |
        Problème de sécurité légitime. Vérification du workflow ci.yml confirme que TOUTES les autres actions GitHub
        suivent le standard de pinning par SHA complet:
        - actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        - actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e  # v5
