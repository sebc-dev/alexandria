# .github/dependabot.yml
# Mises à jour automatiques des dépendances

version: 2
updates:
  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    
    # Regrouper les dépendances pour réduire le bruit
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot*"
          - "org.springframework*"
        update-types:
          - "minor"
          - "patch"
      
      spring-ai:
        patterns:
          - "org.springframework.ai*"
      
      langchain4j:
        patterns:
          - "dev.langchain4j*"
      
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.testcontainers*"
          - "org.wiremock*"
      
      quality-tools:
        patterns:
          - "com.diffplug.spotless*"
          - "com.puppycrawl.tools*"
          - "com.github.spotbugs*"
          - "org.pitest*"
          - "com.google.errorprone*"
      
      resilience:
        patterns:
          - "io.github.resilience4j*"
    
    labels:
      - "dependencies"
      - "java"
    
    commit-message:
      prefix: "deps"
      include: "scope"

  # Docker images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns:
          - "*"
