# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# =============================================================================
# CONFIGURATION CODERABBIT - ALEXANDRIA RAG SERVER
# =============================================================================
# Serveur RAG Java avec Spring Boot 3.5.9, Langchain4j 1.10.0, pgvector
# Optimisé pour développeur expert solo avec focus sur bugs critiques et sécurité
# =============================================================================

language: "fr"
inheritance: false
early_access: false

# -----------------------------------------------------------------------------
# TONE INSTRUCTIONS (max 250 caractères)
# -----------------------------------------------------------------------------
tone_instructions: |
  Concis et technique. Focus bugs, sécurité, patterns Spring/Resilience4j. 
  Ignore style mineur. Vérifie pgvector et MCP. Impératif.

# -----------------------------------------------------------------------------
# REVIEWS
# -----------------------------------------------------------------------------
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: |
    Bullet points concis en français. Highlight:
    - Breaking changes API/MCP
    - Problèmes Resilience4j ou pgvector
    - Violations TDD
  poem: false
  collapse_walkthrough: true
  review_status: true
  commit_status: true
  sequence_diagrams: true
  enable_prompt_for_ai_agents: true

# ---------------------------------------------------------------------------
  # PATH FILTERS - Inclusions ET Exclusions
  # ---------------------------------------------------------------------------
  path_filters:
    # === INCLUSIONS (fichiers à reviewer) ===
    - "src/**/*.java"
    - "src/**/*.xml"
    - "src/**/*.yml"
    - "src/**/*.yaml"
    - "src/**/*.sql"
    - "src/**/*.properties"
    - "pom.xml"
    - ".coderabbit.yaml"
    
    # Scripts shell (sauf dans .claude)
    - "**/*.sh"
    
    # === EXCLUSIONS ===
    # Build et génération
    - "!target/**"
    - "!build/**"
    - "!**/generated/**"
    - "!**/*.class"
    
    # IDE et configuration locale
    - "!.idea/**"
    - "!.vscode/**"
    - "!*.iml"
    
    # Assets et binaires
    - "!**/*.lock"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.svg"

    # Claude Code
    - "!.claude/**"

    # Documentation (exclue sauf si tu veux la reviewer)
    - "!docs/**"
    
    # Dépendances
    - "!**/vendor/**"

  # ---------------------------------------------------------------------------
  # PATH INSTRUCTIONS - Directives contextuelles par couche
  # ---------------------------------------------------------------------------
  path_instructions:
    # --- Core Business Logic ---
    - path: "src/main/java/**/core/**/*.java"
      instructions: |
        COUCHE CORE - Logique métier Alexandria:
        - Vérifie l'utilisation de records Java pour les DTOs
        - Pas d'interfaces abstraites inutiles (architecture flat YAGNI)
        - AlexandriaException avec ErrorCategory obligatoire pour les erreurs
        - @Transactional(isolation = READ_COMMITTED) pour DELETE+INSERT
        - Pas de logique de présentation dans cette couche

    # --- Adapters (HTTP Clients, MCP Tools) ---
    - path: "src/main/java/**/adapters/**/*.java"
      instructions: |
        COUCHE ADAPTERS - Clients HTTP et MCP Tools:
        - @Retry(name = "infinityApi") obligatoire sur clients HTTP
        - Fallback signature: mêmes paramètres + Exception ex en dernier
        - Retry sur HttpServerErrorException (5xx) et ResourceAccessException
        - Ignore HttpClientErrorException (4xx)
        - MCP Response dual-format: JSON structuré + Markdown lisible
        - CallToolResult.builder().isError(true) pour signaler erreurs au LLM
        - Max 8000 tokens pour réponses MCP (tronquer avec "[Content truncated]")

    # --- Configuration ---
    - path: "src/main/java/**/config/**/*.java"
      instructions: |
        COUCHE CONFIG - Configuration Spring:
        - @ConfigurationProperties pour groupes de propriétés
        - RetryConfigCustomizer programmatique pour exponential backoff + jitter
        - NE PAS utiliser YAML pour combiner enableExponentialBackoff + enableRandomizedWait
        - HikariCP connection-init-sql pour SET hnsw.ef_search
        - Pas de @EnableRetry (c'est Spring Retry, pas Resilience4j)

    # --- MCP Tools ---
    - path: "src/main/java/**/adapters/**/*Tool*.java"
      instructions: |
        MCP TOOLS - Spring AI MCP SDK:
        - Annotations @McpTool et @McpToolParam obligatoires
        - Try-catch avec AlexandriaException -> McpResponseFormatter.errorResult()
        - Toujours retourner CallToolResult (jamais null)
        - Log warn pour erreurs métier, error pour unexpected
        - Description claire pour le LLM consommateur

    # --- SQL et pgvector ---
    - path: "**/*.sql"
      instructions: |
        SQL et pgvector:
        - Type vecteur = vector(1024) UNIQUEMENT (pas halfvec - Langchain4j incompatible)
        - Index HNSW manuel obligatoire (Langchain4j crée IVFFlat par défaut)
        - SET hnsw.ef_search dans connection-init-sql, PAS dans schema.sql
        - Index GIN pour JSONB metadata avec jsonb_path_ops
        - Vérifie les risques d'injection SQL

    # --- Tests ---
    - path: "src/test/java/**/*Test.java"
      instructions: |
        TESTS UNITAIRES - TDD Obligatoire:
        - Test écrit AVANT le code de production (Red-Green-Refactor)
        - Pas de @Disabled ou @Ignore sans justification
        - Fixtures via EmbeddingFixtures.randomEmbedding() pour vecteurs 1024D
        - Assertions claires et messages d'erreur explicites
        - Un test = un comportement

    - path: "src/test/java/**/*IT.java"
      instructions: |
        TESTS D'INTÉGRATION:
        - @ServiceConnection avec Testcontainers obligatoire
        - Image pgvector: pgvector/pgvector:0.8.1-pg18
        - Artifact: testcontainers-postgresql (pas postgresql depuis 2.x)
        - WireMock pour stubs Infinity API (InfinityStubs helper)
        - Pas de H2 pour tests pgvector (extension vector non supportée)

    - path: "src/test/java/**/test/**/*.java"
      instructions: |
        TEST SUPPORT - Helpers et Fixtures:
        - PgVectorTestConfiguration avec @TestConfiguration
        - InfinityStubs pour stubEmbedding() et stubRerank()
        - EmbeddingFixtures pour vecteurs 1024D normalisés
        - McpTestSupport pour tests client MCP

    # --- Application Properties ---
    - path: "**/application*.yml"
      instructions: |
        CONFIGURATION YAML Spring:
        - spring.threads.virtual.enabled=true (Virtual Threads)
        - hikari.connection-init-sql pour SET hnsw
        - NE PAS configurer retry exponential + jitter en YAML
        - Profils: default, test, prod

    # --- Logback ---
    - path: "**/logback*.xml"
      instructions: |
        LOGGING:
        - Pattern avec %X{correlationId} obligatoire
        - MDC pour X-Correlation-Id header

    # --- POM Maven ---
    - path: "pom.xml"
      instructions: |
        MAVEN:
        - Langchain4j Spring starters: ${langchain4j-spring.version} explicite
        - langchain4j-pgvector pas dans BOM GA - version explicite requise
        - testcontainers-postgresql (pas postgresql) depuis Testcontainers 2.x
        - spring-boot-starter-aop requis pour @Retry Resilience4j

  # ---------------------------------------------------------------------------
  # AUTO REVIEW
  # ---------------------------------------------------------------------------
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    
    ignore_title_keywords:
      - "WIP"
      - "DRAFT"
      - "DO NOT MERGE"
      - "[SKIP CI]"
      - "[SKIP REVIEW]"
    
    base_branches:
      - "main"
      - "develop"
      - "release-.*"

  # ---------------------------------------------------------------------------
  # PRE-MERGE CHECKS
  # ---------------------------------------------------------------------------
  pre_merge_checks:
    docstrings:
      mode: "warning"
      threshold: 70
    
    title:
      mode: "warning"
      requirements: "Format conventionnel: <type>(<scope>): <description>"
    
    custom_checks:
      - name: "Secrets et credentials"
        mode: "error"
        instructions: |
          ÉCHEC si: credentials, tokens API, clés privées, mots de passe
          en dur dans le code Java, YAML, ou properties.
          Utiliser @Value ou @ConfigurationProperties avec externalization.
          
      - name: "TDD Red-Green-Refactor"
        mode: "warning"
        instructions: |
          AVERTISSEMENT si: nouveau code de production sans test correspondant.
          Chaque méthode publique dans core/ ou adapters/ doit avoir
          un test unitaire ou d'intégration associé.
          
      - name: "Resilience4j patterns"
        mode: "warning"
        instructions: |
          AVERTISSEMENT si: 
          - Client HTTP sans @Retry annotation
          - @Retry sans fallbackMethod défini
          - Fallback avec signature incorrecte (doit inclure Exception ex)

  # ---------------------------------------------------------------------------
  # FINISHING TOUCHES
  # ---------------------------------------------------------------------------
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

  # ---------------------------------------------------------------------------
  # TOOLS - Linters et analyseurs statiques
  # ---------------------------------------------------------------------------
  tools:
    # Sécurité - ESSENTIELS
    gitleaks:
      enabled: true
    semgrep:
      enabled: true
    osvScanner:
      enabled: true
    
    # Java
    pmd:
      enabled: true
      config_file: "pmd-ruleset.xml"
    checkstyle:
      enabled: false  # Désactivé si déjà dans CI
    
    # YAML/Markdown - optionnels
    yamllint:
      enabled: true
    markdownlint:
      enabled: false
    
    # Shell scripts
    shellcheck:
      enabled: true
    
    # Actions GitHub
    actionlint:
      enabled: true
    
    # LanguageTool - documentation
    languagetool:
      enabled: true
      level: "default"
      disabled_categories:
        - "TYPOS"
        - "TYPOGRAPHY"

# -----------------------------------------------------------------------------
# CHAT
# -----------------------------------------------------------------------------
chat:
  auto_reply: true
  art: false

# -----------------------------------------------------------------------------
# KNOWLEDGE BASE
# -----------------------------------------------------------------------------
knowledge_base:
  opt_out: false
  
  learnings:
    scope: "local"  # Apprentissages spécifiques à Alexandria
  
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/project-context.md"
      - "**/CLAUDE.md"
      - "**/.cursorrules"
      - "**/CONTRIBUTING.md"
  
  web_search:
    enabled: true
  
  mcp:
    usage: "auto"

# -----------------------------------------------------------------------------
# CODE GENERATION
# -----------------------------------------------------------------------------
code_generation:
  docstrings:
    language: "fr"
    path_instructions:
      - path: "src/main/java/**/*.java"
        instructions: |
          JavaDoc en français avec:
          - @param pour chaque paramètre
          - @return si non-void
          - @throws pour exceptions déclarées et AlexandriaException